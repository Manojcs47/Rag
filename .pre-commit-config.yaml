# After creating this file, run the commands in step A6.
# ruff, mypy, and detect-secrets run as LOCAL hooks via `uv run` so they share
# the project's environment (no isolated-install or Go-toolchain surprises).
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict, src/)
        entry: uv run mypy
        language: system
        pass_filenames: false
        types_or: [python, pyi]
        require_serial: true
      - id: detect-secrets
        name: detect-secrets (basic secret scan)
        entry: uv run detect-secrets-hook
        language: system
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
