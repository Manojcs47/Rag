# Local Qdrant for the AI Research Navigator.
#   docker compose up -d      # start
#   docker compose down       # stop (data persists in the named volume)
# REST API: http://localhost:6333   |   Dashboard: http://localhost:6333/dashboard
services:
  qdrant:
    # TODO(reproducibility ADR): pin to the tag matching your installed
    # `qdrant-client` (check hub.docker.com/r/qdrant/qdrant/tags), e.g.
    # `qdrant/qdrant:v1.18.0`, instead of :latest.
    image: qdrant/qdrant:latest
    container_name: rn-qdrant
    ports:
      - "6333:6333"   # HTTP / REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
